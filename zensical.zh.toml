[project]
site_name = "molpack 手册"
site_description = "纯 Rust 实现的 Packmol 级分子装填，提供命令行、Python API 和 Rust API。"
# Chinese site tree. Build with: zensical build -f zensical.zh.toml
# Deploy beside English under site/zh so the language switcher /zh/ works.
site_url = "https://molcrafts.github.io/molpack/"
repo_url = "https://github.com/MolCrafts/molpack"
repo_name = "MolCrafts/molpack"
copyright = "Copyright &copy; 2026 MolCrafts"
docs_dir = "docs/zh"
site_dir = "site/zh"

nav = [
  { "首页" = "index.md" },
  { "教程" = [
    { "安装" = "install.md" },
    { "快速开始" = "getting_started.md" },
    { "概念" = "concepts.md" },
    { "示例" = "examples.md" },
    { "Packmol 对等" = "packmol_parity.md" },
  ] },
  { "Packmol 脚本" = [
    { "概览" = "cli/index.md" },
    { "脚本说明" = "cli/script-format.md" },
    { "格式" = "cli/formats.md" },
    { "示例" = "cli/examples.md" },
  ] },
  { "Python" = [
    { "概览" = "python/index.md" },
    { "安装" = "python/installation.md" },
    { "快速开始" = "python/getting-started.md" },
    { "Targets" = "python/guide/targets.md" },
    { "Restraints" = "python/guide/restraints.md" },
    { "Packer" = "python/guide/packer.md" },
    { "周期边界" = "python/guide/periodic-boundaries.md" },
    { "示例" = "python/examples.md" },
    { "API 参考" = "python/api-reference.md" },
  ] },
  { "Rust" = [
    { "概览" = "rust/index.md" },
    { "快速开始" = "rust/getting-started.md" },
    { "约束与 PBC" = "rust/restraints-and-pbc.md" },
    { "Handlers 与 Relaxers" = "rust/handlers-relaxers.md" },
    { "示例" = "rust/examples.md" },
  ] },
  { "开发" = [
    { "贡献" = "development/index.md" },
    { "架构" = "architecture.md" },
    { "扩展" = "extending.md" },
  ] },
]

extra_css = ["assets/stylesheets/extra.css"]

[project.theme]
name = "molcrafts"
language = "zh"

[project.extra]
alternate = [
  { name = "English", link = "/en/", lang = "en" },
  { name = "简体中文", link = "/zh/", lang = "zh" },
]

[project.extra.molcrafts]
product = "molpack"
accent = "#c2410c"
accent_soft = "rgba(194, 65, 12, 0.14)"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/MolCrafts/molpack"
