# Lint on commit; test gates on pre-push share scripts/ with CI.
#   pre-commit install   # installs both types via default_install_hook_types
default_install_hook_types: [pre-commit, pre-push]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff-format
        files: ^python/
      - id: ruff
        files: ^python/
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: clippy
        args: ["--all-targets", "--all-features", "--", "-D", "warnings"]

  - repo: local
    hooks:
      - id: ty
        name: ty (Python type check)
        language: system
        entry: sh -c 'cd python && ty check python tests examples'
        files: ^python/
        pass_filenames: false

      # --- CI parity (pre-push): same scripts as .github/workflows/ci.yml ---
      - id: rust-tests
        name: rust tests (scripts/run-rust-tests.sh)
        language: system
        entry: bash scripts/run-rust-tests.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: python-tests
        name: python tests (isolated venv; scripts/run-python-tests.sh)
        language: system
        entry: bash scripts/run-python-tests.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]
