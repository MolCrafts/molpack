# molpack docs — single English site served at the root.
#
#   zensical build     # docs → site

[project]
site_name = "molpack"
site_description = "Packmol-grade molecular packing in pure Rust, with Python bindings."
site_url = "https://molpack.molcrafts.org/"
repo_url = "https://github.com/MolCrafts/molpack"
repo_name = "MolCrafts/molpack"
copyright = "Copyright &copy; 2026 MolCrafts"
docs_dir = "docs"
site_dir = "site"

nav = [
  { "Home" = "index.md" },
  { "Tutorial" = [
    { "Install" = "install.md" },
    { "Quickstart" = "getting_started.md" },
    { "Concepts" = "concepts.md" },
    { "Examples" = "examples.md" },
    { "Packmol Parity" = "packmol_parity.md" },
  ] },
  { "Packmol Script" = [
    { "Overview" = "cli/index.md" },
    { "Script Notes" = "cli/script-format.md" },
    { "Formats" = "cli/formats.md" },
    { "Examples" = "cli/examples.md" },
  ] },
  { "Python" = [
    { "Overview" = "python/index.md" },
    { "Installation" = "python/installation.md" },
    { "Quickstart" = "python/getting-started.md" },
    { "Targets" = "python/guide/targets.md" },
    { "Restraints" = "python/guide/restraints.md" },
    { "Packer" = "python/guide/packer.md" },
    { "Periodic Boundaries" = "python/guide/periodic-boundaries.md" },
    { "Examples" = "python/examples.md" },
    { "API Reference" = "python/api-reference.md" },
  ] },
  { "Rust" = [
    { "Overview" = "rust/index.md" },
    { "Quickstart" = "rust/getting-started.md" },
    { "Restraints and PBC" = "rust/restraints-and-pbc.md" },
    { "Handlers and Relaxers" = "rust/handlers-relaxers.md" },
    { "Examples" = "rust/examples.md" },
  ] },
  { "Development" = [
    { "Contributing" = "development/index.md" },
    { "Architecture" = "architecture.md" },
    { "Extending" = "extending.md" },
  ] },
]

extra_css = ["assets/stylesheets/extra.css"]

# https://zensical.org/docs/setup/language/#site-language
[project.theme]
name = "molcrafts"
language = "en"

[project.extra.molcrafts]
product = "molpack"
accent = "#c2410c"
accent_soft = "rgba(194, 65, 12, 0.14)"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/MolCrafts/molpack"
