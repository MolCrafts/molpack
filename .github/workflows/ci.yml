name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_call:
  workflow_dispatch:

# Pin sibling molrs to the same version as Cargo.toml / pyproject.toml.
# Bump this when raising molcrafts-molrs / molcrafts-molpy.
env:
  MOLRS_GIT_REF: v0.9.3
  MOLRS_PIN: "0.9.3"
  MOLPY_PIN: "0.9.3"

# Tests live in scripts/run-{rust,python}-tests.sh so pre-commit/pre-push
# and this workflow share one implementation. Lint/format stay in
# .pre-commit-config.yaml (commit stage).

jobs:
  test:
    name: rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: MolCrafts/molrs
          ref: ${{ env.MOLRS_GIT_REF }}
          path: molrs
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: molpack
      - name: Cache test data
        uses: actions/cache@v5
        with:
          path: molrs/molrs-core/target/tests-data
          key: ${{ runner.os }}-test-data-${{ hashFiles('molrs/scripts/fetch-test-data.sh') }}
      - name: Fetch test data
        run: bash scripts/fetch-test-data.sh
        working-directory: molrs
      - name: Rust tests (scripts/run-rust-tests.sh)
        run: bash scripts/run-rust-tests.sh
        working-directory: molpack

  # Packmol regression suite — expensive (runs all five example workloads to
  # convergence, up to ~1h for the spherical case), so it is skipped on pull
  # requests and runs on master pushes, the release gate (workflow_call), and
  # manual dispatch. CONTRIBUTING requires it green for restraint/objective work.
  regression:
    name: packmol regression
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          repository: MolCrafts/molrs
          ref: ${{ env.MOLRS_GIT_REF }}
          path: molrs
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: molpack
      - name: Run examples_batch (--ignored)
        run: cargo test --release --features io --test examples_batch -- --ignored
        working-directory: molpack

  python:
    name: python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: MolCrafts/molrs
          ref: ${{ env.MOLRS_GIT_REF }}
          path: molrs
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: molpack
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Python tests (isolated venv via scripts/run-python-tests.sh)
        run: bash scripts/run-python-tests.sh
        working-directory: molpack
        env:
          MOLRS_PIN: ${{ env.MOLRS_PIN }}
          MOLPY_PIN: ${{ env.MOLPY_PIN }}
