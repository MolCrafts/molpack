name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_call:
  workflow_dispatch:

# Pin sibling molrs to the same version as Cargo.toml / python/pyproject.toml / tox.ini.
# Bump together when raising molcrafts-molrs / molcrafts-molpy.
env:
  MOLRS_GIT_REF: v0.9.3

# Lint: prek + .pre-commit-config.yaml (commit stage).
# Tests: same commands as prek pre-push hooks (no scripts/).

jobs:
  test:
    name: rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: MolCrafts/molrs
          ref: ${{ env.MOLRS_GIT_REF }}
          path: molrs
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: molpack
      - name: Cache test data
        uses: actions/cache@v5
        with:
          path: molrs/molrs-core/target/tests-data
          key: ${{ runner.os }}-test-data-${{ hashFiles('molrs/scripts/fetch-test-data.sh') }}
      - name: Fetch test data
        run: bash scripts/fetch-test-data.sh
        working-directory: molrs
      - name: Rust tests
        working-directory: molpack
        run: |
          set -euo pipefail
          cargo test --features io --lib --tests --examples
          cargo test --test cli --features cli
          cargo check --no-default-features
          cargo check --features rayon
          cargo check --features ff
          cargo build --benches

  # Packmol regression suite — expensive; master / release / dispatch only.
  regression:
    name: packmol regression
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          repository: MolCrafts/molrs
          ref: ${{ env.MOLRS_GIT_REF }}
          path: molrs
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: molpack
      - name: Run examples_batch (--ignored)
        run: cargo test --release --features io --test examples_batch -- --ignored
        working-directory: molpack

  python:
    name: python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: MolCrafts/molrs
          ref: ${{ env.MOLRS_GIT_REF }}
          path: molrs
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: molpack
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: tox -e py (isolated, non-editable)
        working-directory: molpack
        run: |
          uv tool install tox
          tox -e py
