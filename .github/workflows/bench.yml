name: Bench

# Runs the small criterion regression benchmarks (pair kernel, objective
# dispatch, one run_iteration step, restraint evaluation, a tiny end-to-end
# pack). Criterion's `--output-format bencher` emits the libtest
# `bench: N ns/iter` lines for artifact download / local comparison.
#
# These benches are deliberately tiny (one small workload each, sample_size 10,
# ~500 ms measurement) so the whole run is cheap. Every PR already gets a
# `cargo build --benches` compile check in ci.yml; this workflow tracks perf on
# canonical pushes + on demand.
#
# History is not published to gh-pages — keep artifacts only (docs live on
# Cloudflare Pages, not GitHub Pages).

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Pin sibling molrs to the same version as Cargo.toml / python/pyproject.toml.
env:
  MOLRS_GIT_REF: v0.9.3

jobs:
  bench:
    name: criterion regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # molpack path-depends on ../molrs/molrs, so both repos are checked out
      # side by side (matching ci.yml) — hence molpack lives in a subdir.
      - uses: actions/checkout@v6
        with:
          repository: MolCrafts/molrs
          ref: ${{ env.MOLRS_GIT_REF }}
          path: molrs
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: molpack

      # The benches synthesize their own geometry in-process, so no test-data
      # fetch and no `io` feature are needed.
      - name: Run regression benchmarks (bencher output)
        run: |
          cargo bench --benches -- --output-format bencher | tee output.txt
        working-directory: molpack

      - name: Upload bench output
        uses: actions/upload-artifact@v7
        with:
          name: bench-output
          path: molpack/output.txt
          if-no-files-found: error
