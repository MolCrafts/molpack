# Isolated Python binding tests (shared by prek pre-push and CI).
# Non-editable only: sibling molrs path install + maturin wheel + pytest.
#
#   tox -e py
#
# Requires sibling checkout: ../molrs at workspace version 0.9.3
# (CI checks out MolCrafts/molrs@v0.9.3).

[tox]
requires =
    tox>=4.23
env_list =
    py
no_package = true

[testenv:py]
description = throwaway env: non-editable molrs + molpack wheel + pytest
base_python = python3.12
deps =
    maturin>=1.0,<2.0
    pytest
    numpy>=2.0
    typer>=0.12
    molcrafts-molpy==0.9.3
pass_env =
    HOME
    PATH
    CARGO_HOME
    CARGO_TARGET_DIR
    RUSTUP_HOME
    RUSTFLAGS
    MACOSX_DEPLOYMENT_TARGET
    SSH_AUTH_SOCK
    TERM
allowlist_externals =
    maturin
change_dir = {toxinidir}/python
commands_pre =
    # Fail if sibling molrs is not on the pinned version line.
    {envpython} -c "import tomllib; from pathlib import Path; p=Path('{toxinidir}')/'..'/'molrs'/'Cargo.toml'; v=tomllib.loads(p.read_text())['workspace']['package']['version']; assert v=='0.9.3', f'sibling molrs {{v}} != 0.9.3'"
    # Path install without -e → wheel/non-editable (ABI matches Cargo path dep).
    {envpython} -m pip install {toxinidir}/../molrs/molrs-python
    {envpython} -c "import importlib.metadata as m; v=m.version('molcrafts-molrs'); assert v=='0.9.3', v"
    maturin build --release -o {env_tmp_dir}/wheels
    # Glob the wheel in Python (tox does not expand shell globs).
    {envpython} -c "from pathlib import Path; import subprocess, sys; w=next(Path(r'{env_tmp_dir}/wheels').glob('molcrafts_molpack-*.whl')); subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', '--no-deps', str(w)])"
    # Refuse editable / in-tree loads.
    {envpython} -c "import molpack, pathlib; r=pathlib.Path(molpack.__file__).resolve(); assert 'site-packages' in str(r), r"
commands =
    {envpython} -m pytest -v
